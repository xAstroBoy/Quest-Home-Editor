name: release

# Builds the renderer/editor for Windows + Linux + macOS on every `v*` tag and ATTACHES the binaries
# to the matching GitHub release (softprops/action-gh-release below).
#
# ⚠ Runs are currently blocked by an ACCOUNT-level billing lock ("your account is locked due to a
# billing issue") — this affects Actions even on this PUBLIC repo. Once the GitHub billing is resolved,
# re-run this workflow (or push a new `v*` tag) and the Linux + macOS + Windows binaries appear on the
# release automatically. Until then, Linux/macOS users build from source: QuestHomeEditor/build_linux.sh
# (or see README "Building from source").
#
# PhysX is OFF in CI (it's a vendored Windows-only .lib); the cooker uses the device-compatible
# ColliderBox grid, so a PhysX-free build is fully functional.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            bin: Quest Home Editor.exe
            out: Quest-Home-Editor-windows-x64.exe
          - os: ubuntu-latest
            name: linux-x64
            bin: Quest Home Editor
            out: Quest-Home-Editor-linux-x64
          - os: macos-latest
            name: macos-arm64
            bin: Quest Home Editor
            out: Quest-Home-Editor-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Linux deps (Vulkan loader + GLFW/X11/Wayland)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libvulkan-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev pkg-config

      - name: macOS deps (Ninja + MoltenVK)
        if: runner.os == 'macOS'
        run: brew install ninja molten-vk vulkan-loader vulkan-headers

      - name: MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Configure (PhysX off → cross-platform)
        run: cmake -S QuestHomeEditor -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DHSR_HAVE_PHYSX=OFF

      - name: Build (renderer/editor only)
        run: cmake --build build --target hsr_renderer

      - name: Package
        shell: bash
        run: |
          mkdir -p "dist"
          cp "build/${{ matrix.bin }}" "dist/${{ matrix.out }}"
          # Linux/macOS have no Segoe/Arial fallback — ship the open-source UI font beside the binary.
          mkdir -p "dist/third_party/fonts"
          cp QuestHomeEditor/third_party/fonts/InterVariable.ttf "dist/third_party/fonts/" || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: dist

      - name: Attach to the tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.out }}
