# Cross-platform CI and the single release publisher for Quest Home Editor.
# AVX2 stays OFF everywhere: the AVX2 astcenc encoder crashes with 0xc000001d on
# pre-2013 CPUs (issue #1), and it only changes cook SPEED, never cook OUTPUT.
# PhysX is ON for EVERY platform. Without it cookNavmeshSEBD() is a stub that
# returns {}, so every mesh collider is silently DROPPED and the smart floor
# degrades to a coarse ColliderBox grid — a released binary that cooks different
# collision than a local build, with a green build and green tests to hide it.
# Windows links the committed MSVC static libs; Linux/macOS build the same PhysX
# 4.1.2 in config `checked` from source via scripts/build_physx.sh (~2.5 min, and
# cached, so it only rebuilds when the script or the pinned source changes).
# Every job then greps the linked binaries for PxTriangleMesh and fails if absent.
name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: >-
          cmake -S QuestHomeEditor -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DHSR_HAVE_PHYSX=ON
          -DHSR_AVX2=OFF
      - name: Build editor, CLI cooker, and regression tests
        run: cmake --build build --parallel
      - name: Run registered tests
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=ignore
      # Guard: a PhysX-less .exe still builds and still passes every test — it just
      # silently cooks no mesh colliders. Fail the job instead of shipping that.
      - name: Verify PhysX is linked into the release binaries
        shell: pwsh
        run: |
          $bad = $false
          foreach ($f in @("build/Quest Home Editor.exe", "build/hsl_cook.exe")) {
            $bytes = [System.IO.File]::ReadAllBytes($f)
            $text  = [System.Text.Encoding]::ASCII.GetString($bytes)
            if ($text.Contains("PxTriangleMesh")) {
              Write-Host "OK   $f - PhysX linked"
            } else {
              Write-Host "FAIL $f - no PhysX symbols; collision cooking would be a stub"
              $bad = $true
            }
          }
          if ($bad) { exit 1 }
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force pkg/fonts | Out-Null
          Copy-Item "build/Quest Home Editor.exe" pkg/
          Copy-Item "build/hsl_cook.exe" pkg/
          Copy-Item QuestHomeEditor/third_party/fonts/* pkg/fonts/
          Copy-Item "build/Quest Home Editor.exe" Quest-Home-Editor-windows-x64.exe
          Compress-Archive -Path pkg/* -DestinationPath Quest-Home-Editor-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Editor-windows-x64
          path: |
            Quest-Home-Editor-windows-x64.exe
            Quest-Home-Editor-windows-x64.zip

  linux:
    runs-on: ubuntu-22.04 # Older glibc keeps the archive and AppImage broadly compatible.
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build xorg-dev libwayland-dev libxkbcommon-dev libvulkan-dev clang
      - name: Cache PhysX 4.1.2 checked static libs
        id: physx
        uses: actions/cache@v4
        with:
          path: QuestHomeEditor/third_party/physx/lib/linux-x86_64
          key: physx-4.1.2-checked-linux-x86_64-${{ hashFiles('QuestHomeEditor/scripts/build_physx.sh') }}
      - name: Build PhysX from source
        if: steps.physx.outputs.cache-hit != 'true'
        run: bash QuestHomeEditor/scripts/build_physx.sh
      - name: Configure
        run: >-
          cmake -S QuestHomeEditor -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DHSR_HAVE_PHYSX=ON
          -DHSR_AVX2=OFF
      - name: Build editor, CLI cooker, and regression tests
        run: cmake --build build --parallel
      - name: Run registered tests
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=ignore
      - name: Verify PhysX is linked into the release binaries
        run: |
          bad=0
          for f in "build/Quest Home Editor" build/hsl_cook; do
            if grep -qa PxTriangleMesh "$f"; then
              echo "OK   $f - PhysX linked"
            else
              echo "FAIL $f - no PhysX symbols; collision cooking would be a stub"
              bad=1
            fi
          done
          exit $bad
      - name: Package archive and standalone binary
        run: |
          mkdir -p pkg/fonts
          cp "build/Quest Home Editor" pkg/
          cp build/hsl_cook pkg/
          cp QuestHomeEditor/third_party/fonts/* pkg/fonts/
          cp "build/Quest Home Editor" Quest-Home-Editor-linux-x64
          tar -czf Quest-Home-Editor-linux-x64.tar.gz -C pkg .
      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin/fonts
          cp "build/Quest Home Editor" AppDir/usr/bin/questhomeeditor
          cp build/hsl_cook AppDir/usr/bin/hsl_cook
          cp QuestHomeEditor/third_party/fonts/* AppDir/usr/bin/fonts/
          cp QuestHomeEditor/app.png AppDir/questhomeeditor.png
          cat > AppDir/questhomeeditor.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Quest Home Editor
          Exec=questhomeeditor
          Icon=questhomeeditor
          Categories=Graphics;
          EOF
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/questhomeeditor" "$@"
          EOF
          chmod +x AppDir/AppRun
          curl -sSfL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run AppDir Quest-Home-Editor-linux-x64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Editor-linux-x64
          path: |
            Quest-Home-Editor-linux-x64
            Quest-Home-Editor-linux-x64.tar.gz
            Quest-Home-Editor-linux-x64.AppImage

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            libtag: macos-arm64      # must match the tag scripts/build_physx.sh derives from uname -m
          - runner: macos-15-intel
            arch: x64
            libtag: macos-x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: brew install ninja molten-vk
      - name: Cache PhysX 4.1.2 checked static libs
        id: physx
        uses: actions/cache@v4
        with:
          path: QuestHomeEditor/third_party/physx/lib/${{ matrix.libtag }}
          key: physx-4.1.2-checked-${{ matrix.libtag }}-${{ hashFiles('QuestHomeEditor/scripts/build_physx.sh') }}
      - name: Build PhysX from source
        if: steps.physx.outputs.cache-hit != 'true'
        run: bash QuestHomeEditor/scripts/build_physx.sh
      - name: Configure
        run: >-
          cmake -S QuestHomeEditor -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DHSR_HAVE_PHYSX=ON
          -DHSR_AVX2=OFF
      - name: Build editor, CLI cooker, and regression tests
        run: cmake --build build --parallel
      - name: Run registered tests
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=ignore
      - name: Verify PhysX is linked into the release binaries
        run: |
          bad=0
          for f in "build/Quest Home Editor" build/hsl_cook; do
            if grep -qa PxTriangleMesh "$f"; then
              echo "OK   $f - PhysX linked"
            else
              echo "FAIL $f - no PhysX symbols; collision cooking would be a stub"
              bad=1
            fi
          done
          exit $bad
      - name: Package DMG
        run: |
          APP="Quest Home Editor.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources/fonts"
          cp "build/Quest Home Editor" "$APP/Contents/MacOS/"
          cp build/hsl_cook "$APP/Contents/MacOS/"
          cp "$(brew --prefix molten-vk)/lib/libMoltenVK.dylib" "$APP/Contents/MacOS/"
          cp QuestHomeEditor/app.png "$APP/Contents/Resources/"
          cp QuestHomeEditor/third_party/fonts/* "$APP/Contents/Resources/fonts/"
          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>Quest Home Editor</string>
            <key>CFBundleIdentifier</key><string>com.xastroboy.questhomeeditor</string>
            <key>CFBundleName</key><string>Quest Home Editor</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          hdiutil create -volname "Quest Home Editor" -srcfolder "$APP" -ov -format UDZO Quest-Home-Editor-macos-${{ matrix.arch }}.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Editor-macos-${{ matrix.arch }}
          path: Quest-Home-Editor-macos-${{ matrix.arch }}.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Quest-Home-Editor-*
          merge-multiple: true
      # LAST LINE OF DEFENCE before anything reaches a release page. The build jobs already verify
      # their own binaries, but this job publishes whatever the artifacts contain — so re-check the
      # downloaded assets here too. That way a future edit to a build job can never quietly put a
      # PhysX-less binary (no mesh colliders, coarse box floor) in front of a user again.
      # NOT covered: the .AppImage (compressed squashfs) and the .dmg (compressed UDZO) can't be
      # grepped without mounting; both are packed from the exact build/ binaries their job verified.
      - name: Verify every shipped binary has PhysX linked
        run: |
          bad=0
          check() { if grep -qa PxTriangleMesh; then echo "OK   $1"; else echo "FAIL $1 - no PhysX symbols"; bad=1; fi; }
          cat Quest-Home-Editor-windows-x64.exe            | check "windows-x64.exe"
          cat Quest-Home-Editor-linux-x64                  | check "linux-x64"
          unzip -p Quest-Home-Editor-windows-x64.zip "Quest Home Editor.exe" | check "windows-x64.zip -> editor"
          unzip -p Quest-Home-Editor-windows-x64.zip hsl_cook.exe            | check "windows-x64.zip -> hsl_cook"
          tar -xzOf Quest-Home-Editor-linux-x64.tar.gz "./Quest Home Editor" | check "linux-x64.tar.gz -> editor"
          tar -xzOf Quest-Home-Editor-linux-x64.tar.gz ./hsl_cook            | check "linux-x64.tar.gz -> hsl_cook"
          exit $bad
      - name: Attach all platform packages to the tagged release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            Quest-Home-Editor-windows-x64.exe
            Quest-Home-Editor-windows-x64.zip
            Quest-Home-Editor-linux-x64
            Quest-Home-Editor-linux-x64.tar.gz
            Quest-Home-Editor-linux-x64.AppImage
            Quest-Home-Editor-macos-arm64.dmg
            Quest-Home-Editor-macos-x64.dmg
