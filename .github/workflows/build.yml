# Cross-platform CI and the single release publisher for Quest Home Editor.
# AVX2 and PhysX are disabled for portable release binaries. Local Windows
# builds can opt into them when the required CPU and vendored libraries exist.
name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: >-
          cmake -S QuestHomeEditor -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DHSR_HAVE_PHYSX=OFF
          -DHSR_AVX2=OFF
      - name: Build editor, CLI cooker, and regression tests
        run: cmake --build build --parallel
      - name: Run registered tests
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=ignore
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force pkg/fonts | Out-Null
          Copy-Item "build/Quest Home Editor.exe" pkg/
          Copy-Item "build/hsl_cook.exe" pkg/
          Copy-Item QuestHomeEditor/third_party/fonts/* pkg/fonts/
          Copy-Item "build/Quest Home Editor.exe" Quest-Home-Editor-windows-x64.exe
          Compress-Archive -Path pkg/* -DestinationPath Quest-Home-Editor-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Editor-windows-x64
          path: |
            Quest-Home-Editor-windows-x64.exe
            Quest-Home-Editor-windows-x64.zip

  linux:
    runs-on: ubuntu-22.04 # Older glibc keeps the archive and AppImage broadly compatible.
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build xorg-dev libwayland-dev libxkbcommon-dev libvulkan-dev
      - name: Configure
        run: >-
          cmake -S QuestHomeEditor -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DHSR_HAVE_PHYSX=OFF
          -DHSR_AVX2=OFF
      - name: Build editor, CLI cooker, and regression tests
        run: cmake --build build --parallel
      - name: Run registered tests
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=ignore
      - name: Package archive and standalone binary
        run: |
          mkdir -p pkg/fonts
          cp "build/Quest Home Editor" pkg/
          cp build/hsl_cook pkg/
          cp QuestHomeEditor/third_party/fonts/* pkg/fonts/
          cp "build/Quest Home Editor" Quest-Home-Editor-linux-x64
          tar -czf Quest-Home-Editor-linux-x64.tar.gz -C pkg .
      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin/fonts
          cp "build/Quest Home Editor" AppDir/usr/bin/questhomeeditor
          cp build/hsl_cook AppDir/usr/bin/hsl_cook
          cp QuestHomeEditor/third_party/fonts/* AppDir/usr/bin/fonts/
          cp QuestHomeEditor/app.png AppDir/questhomeeditor.png
          cat > AppDir/questhomeeditor.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Quest Home Editor
          Exec=questhomeeditor
          Icon=questhomeeditor
          Categories=Graphics;
          EOF
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/questhomeeditor" "$@"
          EOF
          chmod +x AppDir/AppRun
          curl -sSfL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run AppDir Quest-Home-Editor-linux-x64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Editor-linux-x64
          path: |
            Quest-Home-Editor-linux-x64
            Quest-Home-Editor-linux-x64.tar.gz
            Quest-Home-Editor-linux-x64.AppImage

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: brew install ninja molten-vk
      - name: Configure
        run: >-
          cmake -S QuestHomeEditor -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DHSR_HAVE_PHYSX=OFF
          -DHSR_AVX2=OFF
      - name: Build editor, CLI cooker, and regression tests
        run: cmake --build build --parallel
      - name: Run registered tests
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=ignore
      - name: Package DMG
        run: |
          APP="Quest Home Editor.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources/fonts"
          cp "build/Quest Home Editor" "$APP/Contents/MacOS/"
          cp build/hsl_cook "$APP/Contents/MacOS/"
          cp "$(brew --prefix molten-vk)/lib/libMoltenVK.dylib" "$APP/Contents/MacOS/"
          cp QuestHomeEditor/app.png "$APP/Contents/Resources/"
          cp QuestHomeEditor/third_party/fonts/* "$APP/Contents/Resources/fonts/"
          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>Quest Home Editor</string>
            <key>CFBundleIdentifier</key><string>com.xastroboy.questhomeeditor</string>
            <key>CFBundleName</key><string>Quest Home Editor</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          hdiutil create -volname "Quest Home Editor" -srcfolder "$APP" -ov -format UDZO Quest-Home-Editor-macos-${{ matrix.arch }}.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Editor-macos-${{ matrix.arch }}
          path: Quest-Home-Editor-macos-${{ matrix.arch }}.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Quest-Home-Editor-*
          merge-multiple: true
      - name: Attach all platform packages to the tagged release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            Quest-Home-Editor-windows-x64.exe
            Quest-Home-Editor-windows-x64.zip
            Quest-Home-Editor-linux-x64
            Quest-Home-Editor-linux-x64.tar.gz
            Quest-Home-Editor-linux-x64.AppImage
            Quest-Home-Editor-macos-arm64.dmg
            Quest-Home-Editor-macos-x64.dmg
