# Prebuilt binaries for Windows / Linux / macOS (GitHub issue #3).
# Every push to master builds all platforms and uploads artifacts; pushing a tag (v*) attaches
# them to the release. AVX2 is OFF for shipped binaries (issue #1: 0xc000001d on pre-2013 CPUs);
# build locally with -DHSR_AVX2=ON if you want the faster cooks on a modern machine.
name: build
on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: cmake -S QuestHomeEditor -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target questhomeeditor
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory pkg/fonts | Out-Null
          Copy-Item "build/Quest Home Editor.exe" pkg/
          Copy-Item QuestHomeEditor/third_party/fonts/* pkg/fonts/
          Compress-Archive -Path pkg/* -DestinationPath Quest-Home-Editor-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Editor-windows-x64
          path: Quest-Home-Editor-windows-x64.zip

  linux:
    runs-on: ubuntu-22.04   # older glibc = the AppImage runs on more distros
    steps:
      - uses: actions/checkout@v4
      - name: Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build xorg-dev libwayland-dev libxkbcommon-dev libvulkan-dev
      - name: Configure
        run: cmake -S QuestHomeEditor -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target questhomeeditor
      - name: Package tar.gz
        run: |
          mkdir -p pkg/fonts
          cp "build/Quest Home Editor" pkg/
          cp QuestHomeEditor/third_party/fonts/* pkg/fonts/
          tar -czf Quest-Home-Editor-linux-x64.tar.gz -C pkg .
      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin/fonts
          cp "build/Quest Home Editor" AppDir/usr/bin/questhomeeditor
          cp QuestHomeEditor/third_party/fonts/* AppDir/usr/bin/fonts/
          cp QuestHomeEditor/app.png AppDir/questhomeeditor.png
          cat > AppDir/questhomeeditor.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Quest Home Editor
          Exec=questhomeeditor
          Icon=questhomeeditor
          Categories=Graphics;
          EOF
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/questhomeeditor" "$@"
          EOF
          chmod +x AppDir/AppRun
          curl -sSfL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run AppDir Quest-Home-Editor-linux-x64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Editor-linux-x64
          path: |
            Quest-Home-Editor-linux-x64.tar.gz
            Quest-Home-Editor-linux-x64.AppImage

  macos:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Deps (MoltenVK = the Vulkan implementation on macOS; ninja)
        run: brew install ninja molten-vk
      - name: Configure
        run: cmake -S QuestHomeEditor -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target questhomeeditor
      - name: Package dmg (.app bundle with MoltenVK beside the binary — volk dlopens it)
        run: |
          APP="Quest Home Editor.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources/fonts"
          cp "build/Quest Home Editor" "$APP/Contents/MacOS/"
          MVK="$(brew --prefix molten-vk)/lib/libMoltenVK.dylib"
          cp "$MVK" "$APP/Contents/MacOS/"
          cp QuestHomeEditor/app.png "$APP/Contents/Resources/"
          cp QuestHomeEditor/third_party/fonts/* "$APP/Contents/Resources/fonts/"
          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>Quest Home Editor</string>
            <key>CFBundleIdentifier</key><string>com.xastroboy.questhomeeditor</string>
            <key>CFBundleName</key><string>Quest Home Editor</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          EOF
          hdiutil create -volname "Quest Home Editor" -srcfolder "$APP" -ov -format UDZO Quest-Home-Editor-macos-${{ matrix.arch }}.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Editor-macos-${{ matrix.arch }}
          path: Quest-Home-Editor-macos-${{ matrix.arch }}.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Quest-Home-Editor-windows-x64.zip
            Quest-Home-Editor-linux-x64.tar.gz
            Quest-Home-Editor-linux-x64.AppImage
            Quest-Home-Editor-macos-arm64.dmg
            Quest-Home-Editor-macos-x64.dmg
